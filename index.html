<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bulk Log">
<meta name="theme-color" content="#0F0F12">
<title>Bulk Log</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #0F0F12; color: #E8E6E1; font-family: -apple-system, 'Inter', system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
  body { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
  input, textarea, button { font-family: inherit; -webkit-appearance: none; appearance: none; }
  input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
  button { cursor: pointer; }

  #app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

  .header { background: #18181C; border-bottom: 1px solid #2A2A30; padding: 14px 20px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
  .header-sub { font-size: 11px; letter-spacing: 3px; color: #888; text-transform: uppercase; margin-bottom: 2px; }
  .header-week { font-size: 17px; font-weight: 700; }
  .header-btns { display: flex; gap: 8px; }
  .tab-btn { padding: 6px 14px; border-radius: 6px; border: none; font-size: 13px; font-weight: 600; }
  .tab-active { background: #E8E6E1; color: #0F0F12; }
  .tab-inactive { background: #2A2A30; color: #888; }

  .day-strip { display: flex; gap: 6px; padding: 12px 16px; overflow-x: auto; background: #18181C; border-bottom: 1px solid #2A2A30; flex-shrink: 0; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .day-strip::-webkit-scrollbar { display: none; }
  .day-btn { flex-shrink: 0; padding: 8px 10px; border-radius: 8px; border: 2px solid transparent; background: #141418; text-align: center; min-width: 60px; position: relative; }
  .day-btn-active { border-color: var(--dc); background: color-mix(in srgb, var(--dc) 13%, transparent); }
  .day-btn-logged::after { content: ''; position: absolute; top: 4px; right: 4px; width: 6px; height: 6px; border-radius: 50%; background: #27AE60; }
  .day-lbl { font-size: 10px; color: #666; margin-bottom: 2px; }
  .day-lbl-today { color: #F0A500; font-weight: 700; }
  .day-ico { font-size: 16px; }
  .day-nm { font-size: 10px; color: #666; margin-top: 2px; font-weight: 600; }
  .day-btn-active .day-nm { color: var(--dc); }
  .day-btn-swap-src { border-color: #F0A500 !important; background: #F0A50022 !important; }
  .day-btn-swap-target { border-color: #27AE60 !important; background: #27AE6022 !important; animation: pulse 0.8s infinite alternate; }
  @keyframes pulse { from { opacity: 0.7; } to { opacity: 1; } }
  .swap-day-hint { font-size: 11px; color: #F0A500; text-align: center; padding: 6px 16px; background: #F0A50011; border-bottom: 1px solid #F0A50033; flex-shrink: 0; }

  .sess-hdr { padding: 14px 20px; border-bottom: 1px solid #2A2A30; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
  .sess-ico { width: 42px; height: 42px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
  .sess-title { font-size: 18px; font-weight: 700; }
  .sess-muscles { font-size: 12px; color: #888; margin-top: 1px; }

  .content { flex: 1; overflow-y: auto; padding: 16px 20px 60px; -webkit-overflow-scrolling: touch; }

  /* Exercise card */
  .ex-card { background: #18181C; border-radius: 10px; padding: 14px; margin-bottom: 12px; border: 1px solid #2A2A30; transition: opacity 0.15s; position: relative; }
  .ex-card.dragging { opacity: 0.4; }
  .ex-card.drag-over { border-color: #4A9EBF; }

  .ex-top-row { display: flex; gap: 8px; margin-bottom: 6px; align-items: center; }
  .drag-handle { color: #444; font-size: 18px; padding: 4px 6px; cursor: grab; flex-shrink: 0; touch-action: none; user-select: none; }
  .drag-handle:active { cursor: grabbing; color: #888; }
  .ex-name-inp { flex: 1; background: #0F0F12; border: 1px solid #2A2A30; border-radius: 7px; color: #E8E6E1; padding: 9px 12px; font-size: 14px; font-weight: 600; width: 100%; }
  .ex-rm { background: none; border: none; color: #444; font-size: 18px; padding: 4px 6px; flex-shrink: 0; }

  /* Rep range + RPE target row */
  .ex-config-row { display: flex; gap: 6px; align-items: center; margin-bottom: 8px; flex-wrap: wrap; }
  .ex-config-label { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 1px; flex-shrink: 0; }
  .range-inp { width: 44px; background: #0F0F12; border: 1px solid #2A2A30; border-radius: 5px; color: #F0A500; padding: 4px 6px; font-size: 12px; font-weight: 700; text-align: center; }
  .range-sep { font-size: 12px; color: #555; }
  .rpe-target-inp { width: 44px; background: #0F0F12; border: 1px solid #2A2A30; border-radius: 5px; color: #7D3C98; padding: 4px 6px; font-size: 12px; font-weight: 700; text-align: center; }
  .ex-actions { display: flex; gap: 6px; margin-left: auto; }
  .swap-btn { font-size: 11px; color: #4A9EBF; background: none; border: 1px solid #2A4A5A; border-radius: 5px; padding: 3px 9px; font-weight: 600; flex-shrink: 0; }

  .hint { border-radius: 7px; padding: 8px 10px; margin-bottom: 10px; display: flex; gap: 7px; }
  .hint-type { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 2px; }
  .hint-msg { font-size: 12px; color: #C8C6C0; }
  .last-ref { font-size: 11px; color: #555; margin-bottom: 10px; }

  .swap-panel { background: #0F0F12; border-radius: 8px; padding: 10px; margin-bottom: 12px; border: 1px solid #2A4A5A; }
  .swap-title { font-size: 11px; color: #888; margin-bottom: 8px; letter-spacing: 1px; text-transform: uppercase; }
  .swap-opt { display: block; width: 100%; text-align: left; background: none; border: none; border-bottom: 1px solid #1A2A30; color: #C8E6F0; font-size: 13px; padding: 8px 0; }
  .swap-opt:last-child { border-bottom: none; }

  /* Sets — now 5 columns: set# | kg | reps | rpe | del */
  .sets-hdr { display: grid; grid-template-columns: 28px 1fr 1fr 48px 28px; gap: 5px; margin-bottom: 6px; }
  .sets-hdr span { font-size: 10px; color: #555; text-align: center; }
  .set-row { display: grid; grid-template-columns: 28px 1fr 1fr 48px 28px; gap: 5px; margin-bottom: 6px; align-items: center; }
  .set-num { font-size: 12px; color: #666; text-align: center; font-weight: 700; }
  .set-inp { background: #0F0F12; border: 1px solid #2A2A30; border-radius: 6px; color: #E8E6E1; padding: 7px 4px; font-size: 13px; text-align: center; width: 100%; }
  .set-rpe { background: #0F0F12; border: 1px solid #2A2A30; border-radius: 6px; color: #B088D0; padding: 7px 4px; font-size: 13px; text-align: center; width: 100%; }
  .set-rm { background: none; border: none; color: #444; font-size: 13px; width: 100%; }
  .add-set-btn { width: 100%; margin-top: 6px; padding: 7px; background: none; border: 1px dashed #2A2A30; border-radius: 6px; color: #555; font-size: 12px; }
  .add-ex-btn { width: 100%; padding: 11px; background: none; border: 1px dashed #3A3A44; border-radius: 8px; color: #888; font-size: 13px; font-weight: 600; margin-bottom: 14px; }

  .fld-lbl { font-size: 11px; color: #888; margin-bottom: 6px; letter-spacing: 1px; text-transform: uppercase; }
  .fld-inp { width: 100%; background: #1E1E24; border: 1px solid #2A2A30; border-radius: 8px; color: #E8E6E1; padding: 10px 12px; font-size: 15px; }
  .run-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
  .notes-ta { width: 100%; background: #1E1E24; border: 1px solid #2A2A30; border-radius: 8px; color: #E8E6E1; padding: 10px 12px; font-size: 13px; min-height: 70px; resize: vertical; }
  .auto-saved-indicator { margin-top: 20px; padding: 12px; border-radius: 10px; background: #1A2A1A; border: 1px solid #27AE6044; color: #27AE60; font-size: 13px; font-weight: 600; text-align: center; }

  /* Rest timer overlay */
  .rest-overlay { position: fixed; bottom: 0; left: 0; right: 0; background: #18181C; border-top: 2px solid #2A2A30; padding: 16px 20px 24px; display: flex; align-items: center; gap: 14px; z-index: 100; transform: translateY(100%); transition: transform 0.3s ease; box-shadow: 0 -4px 20px #00000088; }
  .rest-overlay.active { transform: translateY(0); }
  .rest-ring { position: relative; width: 60px; height: 60px; flex-shrink: 0; }
  .rest-ring svg { transform: rotate(-90deg); width: 60px; height: 60px; }
  .rest-ring-track { fill: none; stroke: #2A2A30; stroke-width: 5; }
  .rest-ring-fill { fill: none; stroke: #4A9EBF; stroke-width: 5; stroke-linecap: round; transition: stroke-dashoffset 0.9s linear; }
  .rest-ring-text { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 800; color: #E8E6E1; }
  .rest-info { flex: 1; min-width: 0; }
  .rest-label { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 3px; }
  .rest-ex-name { font-size: 13px; font-weight: 600; color: #E8E6E1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .rest-actions { display: flex; flex-direction: column; gap: 6px; flex-shrink: 0; }
  .rest-skip { background: #C0392B22; border: 1px solid #C0392B55; color: #C0392B; border-radius: 7px; padding: 7px 14px; font-size: 12px; font-weight: 600; white-space: nowrap; }
  .rest-add { background: #4A9EBF22; border: 1px solid #4A9EBF55; color: #4A9EBF; border-radius: 7px; padding: 7px 14px; font-size: 12px; font-weight: 600; white-space: nowrap; }
  .rest-dur-cfg { width: 44px; background: #0F0F12; border: 1px solid #2A2A30; border-radius: 5px; color: #4A9EBF; padding: 4px 6px; font-size: 12px; font-weight: 700; text-align: center; }
  .rest-inp { width: 52px; background: #0F0F12; border: 1px solid #2A2A30; border-radius: 5px; color: #4A9EBF; padding: 4px 6px; font-size: 12px; font-weight: 700; text-align: center; }

  .hist-empty { padding: 40px; text-align: center; color: #555; }
  .hist-empty-ico { font-size: 32px; margin-bottom: 12px; }
  .hist-week-btn { width: 100%; display: flex; justify-content: space-between; align-items: center; background: #18181C; border: 1px solid #2A2A30; border-radius: 10px; padding: 14px 16px; color: #E8E6E1; font-size: 14px; margin-bottom: 8px; text-align: left; }
  .back-btn { background: none; border: none; color: #888; font-size: 13px; margin-bottom: 16px; padding: 0; display: block; }
  .hist-wk-title { font-weight: 700; font-size: 17px; margin-bottom: 16px; }
  .hist-day-card { background: #18181C; border: 1px solid #2A2A30; border-radius: 10px; padding: 14px; margin-bottom: 10px; }
  .hist-day-hdr { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }
  .hist-day-title { font-weight: 700; font-size: 14px; }
  .hist-day-muscles { font-size: 11px; color: #666; }
  .hist-ex-name { font-size: 12px; font-weight: 700; color: #C0392B; margin-bottom: 4px; }
  .hist-sets { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  .hist-chip { font-size: 11px; background: #0F0F12; border: 1px solid #2A2A30; border-radius: 5px; padding: 3px 8px; color: #aaa; }
  .hist-notes { font-size: 12px; color: #666; margin-top: 8px; border-top: 1px solid #2A2A30; padding-top: 8px; }
  .run-stats { display: flex; gap: 20px; }
  .stat-lbl { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 1px; }
  .stat-val { font-size: 15px; font-weight: 700; }
</style>
</head>
<body>
<div id="app"></div>
<script>
const PLAN = {
  Monday:    { type:"run", label:"Run #1",            color:"#4A9EBF", icon:"🏃" },
  Tuesday:   { type:"gym", label:"Push",              color:"#C0392B", icon:"💪", muscles:"Chest · Shoulders · Triceps" },
  Wednesday: { type:"gym", label:"Pull",              color:"#C0392B", icon:"💪", muscles:"Back · Biceps" },
  Thursday:  { type:"gym", label:"Legs A",            color:"#C0392B", icon:"🦵", muscles:"Quads · Calves" },
  Friday:    { type:"run", label:"Run #2",            color:"#4A9EBF", icon:"🏃" },
  Saturday:  { type:"gym", label:"Upper",             color:"#C0392B", icon:"💪", muscles:"Strength Focus · Compounds" },
  Sunday:    { type:"gym", label:"Legs B + Mobility", color:"#7D3C98", icon:"🧘", muscles:"Posterior Chain · Hip Flexors · Hamstrings" },
};

const DEFS = {
  Tuesday: [
    { name:"Barbell Bench Press",      rl:6,  rh:8,  rpe:8, s:4, wj:2.5, alts:["Dumbbell Bench Press","Incline Barbell Press","Push-Up (weighted)"] },
    { name:"Incline Dumbbell Press",   rl:8,  rh:10, rpe:8, s:3, wj:2,   alts:["Incline Cable Fly","Incline Barbell Press","Landmine Press"] },
    { name:"Cable Lateral Raise",      rl:12, rh:15, rpe:9, s:3, wj:1,   alts:["Dumbbell Lateral Raise","Machine Lateral Raise","Upright Row"] },
    { name:"Overhead Press (barbell)", rl:6,  rh:8,  rpe:8, s:3, wj:2.5, alts:["Dumbbell Shoulder Press","Arnold Press","Seated Machine Press"] },
    { name:"Tricep Rope Pushdown",     rl:12, rh:15, rpe:9, s:3, wj:2.5, alts:["Overhead Tricep Extension","Skull Crusher","Close-Grip Bench Press"] },
  ],
  Wednesday: [
    { name:"Barbell Row",              rl:6,  rh:8,  rpe:8, s:4, wj:2.5, alts:["Pendlay Row","Dumbbell Row","Cable Row"] },
    { name:"Pull-Up / Lat Pulldown",   rl:8,  rh:10, rpe:8, s:4, wj:2.5, alts:["Assisted Pull-Up","Wide-Grip Pulldown","Single-Arm Pulldown"] },
    { name:"Cable Face Pull",          rl:15, rh:15, rpe:8, s:3, wj:2.5, alts:["Band Face Pull","Rear Delt Fly","Reverse Pec Deck"] },
    { name:"Dumbbell Curl",            rl:10, rh:12, rpe:9, s:3, wj:2,   alts:["Barbell Curl","Hammer Curl","Cable Curl"] },
    { name:"Incline Dumbbell Curl",    rl:10, rh:12, rpe:9, s:3, wj:2,   alts:["Concentration Curl","Preacher Curl","Spider Curl"] },
  ],
  Thursday: [
    { name:"Barbell Back Squat",       rl:6,  rh:8,  rpe:8, s:4, wj:2.5, alts:["Goblet Squat","Leg Press","Hack Squat"] },
    { name:"Bulgarian Split Squat",    rl:8,  rh:10, rpe:8, s:3, wj:2,   alts:["Walking Lunge","Reverse Lunge","Step-Up"] },
    { name:"Leg Extension",            rl:12, rh:15, rpe:9, s:3, wj:2.5, alts:["Sissy Squat","Terminal Knee Extension","Wall Sit"] },
    { name:"Standing Calf Raise",      rl:12, rh:15, rpe:9, s:4, wj:2.5, alts:["Seated Calf Raise","Leg Press Calf Raise","Single-Leg Calf Raise"] },
  ],
  Saturday: [
    { name:"Barbell Bench Press",      rl:5,  rh:5,  rpe:8, s:5, wj:2.5, alts:["Dumbbell Bench Press","Weighted Dip","Floor Press"] },
    { name:"Weighted Pull-Up",         rl:5,  rh:5,  rpe:8, s:5, wj:2.5, alts:["Pull-Up","Lat Pulldown (heavy)","Cable Row (heavy)"] },
    { name:"Overhead Press (barbell)", rl:5,  rh:6,  rpe:8, s:4, wj:2.5, alts:["Push Press","Dumbbell Shoulder Press","Z-Press"] },
    { name:"Dumbbell Row",             rl:8,  rh:8,  rpe:8, s:4, wj:2,   alts:["Chest-Supported Row","Cable Row","Meadows Row"] },
    { name:"Cable Lateral Raise",      rl:15, rh:15, rpe:9, s:3, wj:1,   alts:["Dumbbell Lateral Raise","Machine Lateral Raise","Leaning Cable Raise"] },
  ],
  Sunday: [
    { name:"Romanian Deadlift",        rl:8,  rh:10, rpe:8, s:4, wj:2.5, alts:["Stiff-Leg Deadlift","Dumbbell RDL","Single-Leg RDL"] },
    { name:"Lying Leg Curl",           rl:10, rh:12, rpe:9, s:3, wj:2.5, alts:["Seated Leg Curl","Nordic Curl (assisted)","Swiss Ball Curl"] },
    { name:"Hip Thrust",               rl:10, rh:12, rpe:9, s:4, wj:5,   alts:["Glute Bridge","Cable Pull-Through","Donkey Kick Machine"] },
    { name:"Seated Calf Raise",        rl:12, rh:15, rpe:9, s:3, wj:2.5, alts:["Standing Calf Raise","Leg Press Calf Raise","Single-Leg Calf Raise"] },
  ],
};

const DAYS = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];

function sGet(k) { try { const v=localStorage.getItem(k); return v?JSON.parse(v):null; } catch{return null;} }
function sSet(k,v) { try { localStorage.setItem(k,JSON.stringify(v)); } catch{} }
function sList(prefix) { const r=[]; for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.startsWith(prefix))r.push(k);} return r; }

function todayName() { return DAYS[new Date().getDay()===0?6:new Date().getDay()-1]; }
function weekKey(offset=0) {
  const now=new Date(), d=now.getDay()===0?6:now.getDay()-1, mon=new Date(now);
  mon.setDate(now.getDate()-d+offset*7); return mon.toISOString().split("T")[0];
}
function weekLabel(wk) {
  const d=new Date(wk),e=new Date(d); e.setDate(d.getDate()+6);
  return `${d.toLocaleDateString("en-GB",{day:"numeric",month:"short"})} – ${e.toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"})}`;
}

function calcHint(lastSets, rl, rh, wj) {
  if(!lastSets||!lastSets.length) return null;
  const filled=lastSets.filter(s=>s.w&&s.r);
  if(!filled.length) return null;
  const reps=filled.map(s=>parseInt(s.r)), base=parseFloat(filled[0].w);
  const min=Math.min(...reps), allTop=reps.every(r=>r>=rh);
  if(allTop) return {type:"weight", msg:`↑ Increase to ${base+wj}kg — aim for ${rl} reps each set`, color:"#27AE60", icon:"🏆"};
  const worst=reps.indexOf(min)+1;
  return {type:"reps", msg:`Push for ${Math.min(min+1,rh)} reps on all sets (set ${worst} was weakest at ${min})`, color:"#F0A500", icon:"📈"};
}

function defaultLog(day) {
  const defs=DEFS[day];
  if(!defs) return {exercises:[{name:"",rl:null,rh:null,rpe:8,wj:2.5,sets:[{w:"",r:"",rpe:""}]}],notes:""};
  return {
    exercises: defs.map(d=>({ name:d.name, rl:d.rl, rh:d.rh, rpe:d.rpe||8, wj:d.wj, sets:Array.from({length:d.s},()=>({w:"",r:"",rpe:""})) })),
    notes:""
  };
}

const WK=weekKey(0), LWK=weekKey(-1);
let S = {
  view:"log", day:todayName(),
  logs:sGet(`logs:${WK}`)||{},
  lwLogs:sGet(`logs:${LWK}`)||{},
  histWeeks:sList("logs:").map(k=>k.replace("logs:","")).filter(k=>k!==WK).sort().reverse(),
  swapIdx:null, histSel:null, histLog:null, saved:false,
  dragSrcIdx:null,
  daySwapSrc:null,
};

function getLog() {
  const p=PLAN[S.day];
  return S.logs[S.day]||(p.type==="gym"?defaultLog(S.day):{distance:"",duration:"",notes:""});
}
function mutLog(fn) {
  const l=JSON.parse(JSON.stringify(getLog()));
  fn(l); S.logs={...S.logs,[S.day]:l};
  sSet(`logs:${WK}`,S.logs);
  S.histWeeks=sList("logs:").map(k=>k.replace("logs:","")).filter(k=>k!==WK).sort().reverse();
}
function renderSaveBtn() {} // no-op, kept for safety

function repsCol(r,rl,rh){
  if(!r||!rl) return "#E8E6E1";
  const n=parseInt(r);
  if(n>=rh) return "#27AE60";
  if(n>=rl) return "#F0A500";
  return "#C0392B";
}

function rpeCol(rpe, target) {
  if(!rpe||!target) return "#B088D0";
  const diff = parseInt(rpe) - parseInt(target);
  if(diff <= 0) return "#27AE60";
  if(diff === 1) return "#F0A500";
  return "#C0392B";
}

// ── DOM helpers ───────────────────────────────────────────────────────────────
function mk(tag,cls){ const e=document.createElement(tag); if(cls) e.className=cls; return e; }
function mkT(tag,cls,text){ const e=mk(tag,cls); e.textContent=text; return e; }

// ── Drag and drop (touch + mouse) ─────────────────────────────────────────────
let dragState = { src:null, srcIdx:null };

function setupDrag(handle, cardEl, ei) {
  // Touch drag
  let startY, startScroll;
  handle.addEventListener("touchstart", e => {
    dragState.src = cardEl;
    dragState.srcIdx = ei;
    startY = e.touches[0].clientY;
    cardEl.style.opacity = "0.5";
    e.stopPropagation();
  }, {passive:true});

  handle.addEventListener("touchmove", e => {
    if(dragState.src === null) return;
    const y = e.touches[0].clientY;
    // Find which card we're over
    const cards = [...document.querySelectorAll(".ex-card")];
    let overIdx = null;
    cards.forEach((c,i) => {
      const rect = c.getBoundingClientRect();
      if(y >= rect.top && y <= rect.bottom) overIdx = i;
      c.classList.remove("drag-over");
    });
    if(overIdx !== null && overIdx !== dragState.srcIdx) {
      cards[overIdx].classList.add("drag-over");
    }
    e.preventDefault();
  }, {passive:false});

  handle.addEventListener("touchend", e => {
    if(dragState.src === null) return;
    const y = e.changedTouches[0].clientY;
    const cards = [...document.querySelectorAll(".ex-card")];
    let overIdx = null;
    cards.forEach((c,i) => {
      const rect = c.getBoundingClientRect();
      if(y >= rect.top && y <= rect.bottom) overIdx = i;
      c.classList.remove("drag-over");
    });
    cardEl.style.opacity = "1";
    if(overIdx !== null && overIdx !== dragState.srcIdx) {
      mutLog(l => {
        const exs = l.exercises;
        const [moved] = exs.splice(dragState.srcIdx, 1);
        exs.splice(overIdx, 0, moved);
      });
      S.swapIdx = null;
      render();
    }
    dragState = { src:null, srcIdx:null };
  }, {passive:true});

  // Mouse drag (desktop fallback)
  handle.addEventListener("dragstart", e => {
    dragState.src = cardEl;
    dragState.srcIdx = ei;
    cardEl.classList.add("dragging");
    e.dataTransfer.effectAllowed = "move";
  });
  cardEl.addEventListener("dragover", e => { e.preventDefault(); cardEl.classList.add("drag-over"); });
  cardEl.addEventListener("dragleave", () => cardEl.classList.remove("drag-over"));
  cardEl.addEventListener("drop", e => {
    e.preventDefault();
    cardEl.classList.remove("drag-over");
    if(dragState.srcIdx !== null && dragState.srcIdx !== ei) {
      mutLog(l => {
        const exs = l.exercises;
        const [moved] = exs.splice(dragState.srcIdx, 1);
        exs.splice(ei, 0, moved);
      });
      S.swapIdx = null;
      render();
    }
  });
  cardEl.addEventListener("dragend", () => {
    cardEl.classList.remove("dragging");
    document.querySelectorAll(".ex-card").forEach(c => c.classList.remove("drag-over"));
    dragState = { src:null, srcIdx:null };
  });
  handle.setAttribute("draggable","true");
  cardEl.setAttribute("draggable","false");
}


// ── Rest Timer ────────────────────────────────────────────────────────────────
let restTimer = { interval: null, remaining: 0, total: 0, exName: '' };
const CIRC = 2 * Math.PI * 26; // circumference for r=26

function startRest(exName, seconds) {
  clearInterval(restTimer.interval);
  restTimer.exName = exName;
  restTimer.total = seconds;
  restTimer.remaining = seconds;
  updateRestUI();
  document.getElementById('rest-overlay').classList.add('active');
  document.getElementById('rest-ex-label').textContent = exName || 'Next set';
  document.getElementById('rest-dur-inp').value = seconds;
  restTimer.interval = setInterval(() => {
    restTimer.remaining--;
    if (restTimer.remaining <= 0) {
      restTimer.remaining = 0;
      clearInterval(restTimer.interval);
      updateRestUI();
      // Vibrate if supported
      if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
      setTimeout(restSkip, 1200);
    } else {
      updateRestUI();
    }
  }, 1000);
}

function updateRestUI() {
  const el = document.getElementById('rest-countdown');
  const arc = document.getElementById('rest-arc');
  if (!el || !arc) return;
  el.textContent = restTimer.remaining;
  const pct = restTimer.total > 0 ? restTimer.remaining / restTimer.total : 0;
  arc.style.strokeDasharray = CIRC;
  arc.style.strokeDashoffset = CIRC * (1 - pct);
  // Colour shifts red as time runs out
  arc.style.stroke = restTimer.remaining <= 10 ? '#C0392B' : restTimer.remaining <= 20 ? '#F0A500' : '#4A9EBF';
}

function restSkip() {
  clearInterval(restTimer.interval);
  document.getElementById('rest-overlay').classList.remove('active');
}

function restAdd30() {
  restTimer.remaining += 30;
  restTimer.total += 30;
  updateRestUI();
}

// Sync rest duration input
document.addEventListener('DOMContentLoaded', () => {
  const inp = document.getElementById('rest-dur-inp');
  if (inp) inp.addEventListener('change', () => {
    const v = parseInt(inp.value);
    if (v > 0) { restTimer.total = v; restTimer.remaining = v; updateRestUI(); }
  });
});

// ── Main render ───────────────────────────────────────────────────────────────
function render() {
  const app=document.getElementById("app");
  app.innerHTML="";
  const p=PLAN[S.day];

  const hdr=mk("div","header");
  const hdrL=mk("div");
  hdrL.appendChild(mkT("div","header-sub","Bulk Log"));
  hdrL.appendChild(mkT("div","header-week",weekLabel(WK)));
  const hdrR=mk("div","header-btns");
  ["log","history"].forEach(v=>{
    const b=mkT("button","tab-btn "+(S.view===v||S.view==="hist-detail"&&v==="history"?"tab-active":"tab-inactive"),v==="log"?"Week":"History");
    b.onclick=()=>{if(v==="history"){S.view="history";S.histSel=null;S.histLog=null;}else{S.view="log";}render();};
    hdrR.appendChild(b);
  });
  hdr.append(hdrL,hdrR); app.appendChild(hdr);

  if(S.view==="history"||S.view==="hist-detail"){renderHistory(app);return;}

  // Day swap hint bar
  if(S.daySwapSrc) {
    const hint=mkT("div","swap-day-hint",`Tap another day to swap with ${S.daySwapSrc} · Tap ${S.daySwapSrc} again to cancel`);
    app.appendChild(hint);
  }

  const strip=mk("div","day-strip");
  DAYS.forEach(day=>{
    const p2=PLAN[day],isT=day===todayName(),isA=day===S.day,isL=!!S.logs[day];
    const isSrc=day===S.daySwapSrc, isSwapTarget=S.daySwapSrc&&day!==S.daySwapSrc;
    let cls=`day-btn${isA&&!S.daySwapSrc?" day-btn-active":""}${isL?" day-btn-logged":""}${isSrc?" day-btn-swap-src":""}${isSwapTarget?" day-btn-swap-target":""}`;
    const b=mk("div",cls);
    b.style.setProperty("--dc",p2.color);
    b.appendChild(mkT("div","day-lbl"+(isT?" day-lbl-today":""),day.slice(0,3).toUpperCase()));
    b.appendChild(mkT("div","day-ico",p2.icon));
    b.appendChild(mkT("div","day-nm",p2.label.split(" ")[0]));

    // Long-press to start swap mode
    let pressTimer=null;
    b.addEventListener("touchstart",()=>{
      pressTimer=setTimeout(()=>{ S.daySwapSrc=day; render(); },500);
    },{passive:true});
    b.addEventListener("touchend",()=>clearTimeout(pressTimer),{passive:true});
    b.addEventListener("touchmove",()=>clearTimeout(pressTimer),{passive:true});
    // Mouse long-press fallback
    b.addEventListener("mousedown",()=>{ pressTimer=setTimeout(()=>{ S.daySwapSrc=day; render(); },500); });
    b.addEventListener("mouseup",()=>clearTimeout(pressTimer));

    b.onclick=()=>{
      if(S.daySwapSrc) {
        if(S.daySwapSrc===day) { S.daySwapSrc=null; render(); return; }
        // Perform swap — swap the log entries for both days
        const a=S.daySwapSrc, bDay=day;
        const logA=S.logs[a]||null, logB=S.logs[bDay]||null;
        if(logA) S.logs[bDay]=logA; else delete S.logs[bDay];
        if(logB) S.logs[a]=logB; else delete S.logs[a];
        sSet(`logs:${WK}`,S.logs);
        S.day=bDay; S.daySwapSrc=null; S.swapIdx=null;
        render(); return;
      }
      S.day=day; S.swapIdx=null; render();
    };
    strip.appendChild(b);
  });
  app.appendChild(strip);

  const sh=mk("div","sess-hdr");
  const sico=mk("div","sess-ico"); sico.style.background=`color-mix(in srgb,${p.color} 13%,transparent)`; sico.textContent=p.icon;
  const sinfo=mk("div");
  sinfo.appendChild(mkT("div","sess-title",p.label));
  if(p.muscles) sinfo.appendChild(mkT("div","sess-muscles",p.muscles));
  sh.append(sico,sinfo); app.appendChild(sh);

  const content=mk("div","content"); app.appendChild(content);
  if(p.type==="run") renderRun(content);
  else renderGym(content,p);

  const saveBtn=mkT("div","auto-saved-indicator","✓ Changes saved automatically");
  content.appendChild(saveBtn);
}

function renderRun(container) {
  const log=getLog();
  const grid=mk("div","run-grid");
  [["Distance (km)","distance","5.0"],["Duration (min)","duration","30"]].forEach(([label,key,ph])=>{
    const w=mk("div"); w.appendChild(mkT("div","fld-lbl",label));
    const inp=mk("input","fld-inp"); inp.type="number"; inp.placeholder=ph; inp.value=log[key]||"";
    inp.addEventListener("change",()=>{ mutLog(l=>l[key]=inp.value); });
    inp.addEventListener("blur",()=>{ mutLog(l=>l[key]=inp.value); });
    w.appendChild(inp); grid.appendChild(w);
  });
  container.appendChild(grid);
  container.appendChild(mkT("div","fld-lbl","Notes"));
  const ta=mk("textarea","notes-ta"); ta.placeholder="How did it feel? Pace, route, effort level..."; ta.value=log.notes||"";
  ta.addEventListener("change",()=>{ mutLog(l=>l.notes=ta.value); });
  ta.addEventListener("blur",()=>{ mutLog(l=>l.notes=ta.value); });
  container.appendChild(ta);
}

function renderGym(container, plan) {
  const log=getLog();
  const dayDefs=DEFS[S.day]||[];
  const lwDay=S.lwLogs[S.day]||null;

  log.exercises.forEach((ex,ei)=>{
    const card=mk("div","ex-card");

    // Top row: drag handle | name | delete
    const topRow=mk("div","ex-top-row");
    const handle=mkT("div","drag-handle","⠿");
    const nameInp=mk("input","ex-name-inp"); nameInp.placeholder=`Exercise ${ei+1}`; nameInp.value=ex.name||"";
    nameInp.addEventListener("input",()=>{ mutLog(l=>l.exercises[ei].name=nameInp.value); });
    const rmBtn=mkT("button","ex-rm","✕");
    rmBtn.onclick=()=>{ mutLog(l=>l.exercises.splice(ei,1)); S.swapIdx=null; render(); };
    topRow.append(handle,nameInp,rmBtn);
    card.appendChild(topRow);

    // Config row: rep range | RPE target | swap
    const cfgRow=mk("div","ex-config-row");

    cfgRow.appendChild(mkT("span","ex-config-label","Reps"));
    const rlInp=mk("input","range-inp"); rlInp.type="number"; rlInp.placeholder="6"; rlInp.value=ex.rl||"";
    rlInp.title="Rep range low";
    rlInp.addEventListener("input",()=>{ mutLog(l=>l.exercises[ei].rl=parseInt(rlInp.value)||null); });
    cfgRow.appendChild(rlInp);
    cfgRow.appendChild(mkT("span","range-sep","–"));
    const rhInp=mk("input","range-inp"); rhInp.type="number"; rhInp.placeholder="8"; rhInp.value=ex.rh||"";
    rhInp.title="Rep range high";
    rhInp.addEventListener("input",()=>{ mutLog(l=>l.exercises[ei].rh=parseInt(rhInp.value)||null); });
    cfgRow.appendChild(rhInp);

    cfgRow.appendChild(mkT("span","ex-config-label","RPE"));
    const rpeInp=mk("input","rpe-target-inp"); rpeInp.type="number"; rpeInp.placeholder="8"; rpeInp.value=ex.rpe||"";
    rpeInp.title="Target RPE";
    rpeInp.addEventListener("input",()=>{ mutLog(l=>l.exercises[ei].rpe=parseInt(rpeInp.value)||null); });
    cfgRow.appendChild(rpeInp);

    cfgRow.appendChild(mkT("span","ex-config-label","Rest"));
    const restInp=mk("input","rest-dur-cfg"); restInp.type="number"; restInp.placeholder="90"; restInp.value=ex.rest||"90";
    restInp.title="Rest duration (seconds)";
    restInp.addEventListener("input",()=>{ mutLog(l=>l.exercises[ei].rest=parseInt(restInp.value)||90); });
    cfgRow.appendChild(restInp);
    cfgRow.appendChild(mkT("span","ex-config-label","s"));

    // Swap button
    const defEx=dayDefs[ei];
    const allOpts=defEx?[defEx.name,...defEx.alts]:[];
    const alts=allOpts.filter(n=>n!==ex.name);
    if(alts.length){
      const sb=mkT("button","swap-btn",S.swapIdx===ei?"Cancel":"⇄ Swap");
      sb.onclick=()=>{S.swapIdx=S.swapIdx===ei?null:ei;render();};
      cfgRow.appendChild(sb);
    }
    card.appendChild(cfgRow);

    // Progressive overload hint
    const lwEx=lwDay?.exercises?.find(e=>e.name===ex.name)||null;
    if(ex.rl&&lwEx){
      const hint=calcHint(lwEx.sets,ex.rl,ex.rh,ex.wj||2.5);
      if(hint){
        const h=mk("div","hint");
        h.style.background=`color-mix(in srgb,${hint.color} 10%,transparent)`;
        h.style.border=`1px solid color-mix(in srgb,${hint.color} 33%,transparent)`;
        const ht=mkT("div","hint-type",hint.type==="weight"?"Increase Weight":"Push for More Reps");
        ht.style.color=hint.color;
        const htxt=mk("div"); htxt.append(ht,mkT("div","hint-msg",hint.msg));
        h.append(mkT("span","",hint.icon),htxt); card.appendChild(h);
      }
    } else if(lwEx&&lwEx.sets?.some(s=>s.w)){
      const ref=lwEx.sets.filter(s=>s.w).map(s=>`${s.w}kg×${s.r}`).join(", ");
      card.appendChild(mkT("div","last-ref",`Last week: ${ref}`));
    }

    // Swap panel
    if(S.swapIdx===ei&&alts.length){
      const sp=mk("div","swap-panel");
      sp.appendChild(mkT("div","swap-title","Choose alternative"));
      alts.forEach(alt=>{
        const ob=mkT("button","swap-opt",alt);
        ob.onclick=()=>{
          const nd=dayDefs.find(d=>d.name===alt||d.alts?.includes(alt));
          mutLog(l=>{
            l.exercises[ei].name=alt;
            if(nd){l.exercises[ei].rl=nd.rl;l.exercises[ei].rh=nd.rh;l.exercises[ei].rpe=nd.rpe||8;l.exercises[ei].wj=nd.wj;}
          });
          S.swapIdx=null; render();
        };
        sp.appendChild(ob);
      });
      card.appendChild(sp);
    }

    // Sets header — KG | REPS | RPE | del
    const sh=mk("div","sets-hdr");
    ["#","KG","REPS","RPE",""].forEach(t=>sh.appendChild(mkT("span","",t)));
    card.appendChild(sh);

    // Sets
    ex.sets.forEach((set,si)=>{
      const rc=repsCol(set.r,ex.rl,ex.rh);
      const rpec=rpeCol(set.rpe,ex.rpe);
      const row=mk("div","set-row");
      row.appendChild(mkT("div","set-num",String(si+1)));

      const wi=mk("input","set-inp"); wi.type="number"; wi.placeholder="—"; wi.value=set.w||"";
      wi.addEventListener("input",()=>{ mutLog(l=>l.exercises[ei].sets[si].w=wi.value); });

      const ri=mk("input","set-inp"); ri.type="number"; ri.placeholder="—"; ri.value=set.r||"";
      ri.style.color=rc; ri.style.fontWeight=set.r?"700":"400";
      ri.style.borderColor=set.r&&ex.rl?rc+"88":"#2A2A30";
      ri.addEventListener("input",()=>{
        mutLog(l=>l.exercises[ei].sets[si].r=ri.value);
        const nc=repsCol(ri.value,ex.rl,ex.rh);
        ri.style.color=nc; ri.style.fontWeight=ri.value?"700":"400";
        ri.style.borderColor=ri.value&&ex.rl?nc+"88":"#2A2A30";
      });
      ri.addEventListener("blur",()=>{
        if(ri.value) startRest(ex.name, ex.rest||90);
      });

      const rpei=mk("input","set-rpe"); rpei.type="number"; rpei.placeholder="—"; rpei.value=set.rpe||"";
      rpei.style.color=rpec;
      rpei.addEventListener("input",()=>{
        mutLog(l=>l.exercises[ei].sets[si].rpe=rpei.value);
        rpei.style.color=rpeCol(rpei.value,ex.rpe);
      });

      const rm=mkT("button","set-rm","✕");
      rm.onclick=()=>{ mutLog(l=>l.exercises[ei].sets.splice(si,1)); render(); };
      row.append(wi,ri,rpei,rm); card.appendChild(row);
    });

    const addSet=mkT("button","add-set-btn","+ Add Set");
    addSet.onclick=()=>{ mutLog(l=>l.exercises[ei].sets.push({w:"",r:"",rpe:""})); render(); };
    card.appendChild(addSet);

    // Set up drag after card is built
    setupDrag(handle, card, ei);
    container.appendChild(card);
  });

  const addEx=mkT("button","add-ex-btn","+ Add Exercise");
  addEx.onclick=()=>{ mutLog(l=>l.exercises.push({name:"",rl:null,rh:null,rpe:8,wj:2.5,sets:[{w:"",r:"",rpe:""}]})); render(); };
  container.appendChild(addEx);

  container.appendChild(mkT("div","fld-lbl","Session Notes"));
  const ta=mk("textarea","notes-ta"); ta.placeholder="Energy, PRs, injuries, anything to remember..."; ta.value=log.notes||"";
  ta.addEventListener("change",()=>{ mutLog(l=>l.notes=ta.value); });
  ta.addEventListener("blur",()=>{ mutLog(l=>l.notes=ta.value); });
  container.appendChild(ta);
}

function renderHistory(app){
  const content=mk("div","content"); app.appendChild(content);
  if(S.histSel&&S.histLog){
    const back=mkT("button","back-btn","← Back to history");
    back.onclick=()=>{S.view="history";S.histSel=null;S.histLog=null;render();};
    content.appendChild(back);
    content.appendChild(mkT("div","hist-wk-title",weekLabel(S.histSel)));
    DAYS.forEach(day=>{
      const log=S.histLog[day],p=PLAN[day]; if(!log) return;
      const card=mk("div","hist-day-card");
      const dh=mk("div","hist-day-hdr");
      dh.appendChild(mkT("span","",p.icon+" "));
      const di=mk("div");
      di.appendChild(mkT("div","hist-day-title",`${day} — ${p.label}`));
      if(p.muscles) di.appendChild(mkT("div","hist-day-muscles",p.muscles));
      dh.appendChild(di); card.appendChild(dh);
      if(p.type==="run"){
        const rs=mk("div","run-stats");
        [["Distance",log.distance?`${log.distance} km`:"—"],["Duration",log.duration?`${log.duration} min`:"—"]].forEach(([l,v])=>{
          const w=mk("div"); w.appendChild(mkT("div","stat-lbl",l)); w.appendChild(mkT("div","stat-val",v)); rs.appendChild(w);
        });
        card.appendChild(rs);
      } else {
        (log.exercises||[]).forEach(ex=>{
          if(!ex.name) return;
          card.appendChild(mkT("div","hist-ex-name",ex.name));
          const chips=mk("div","hist-sets");
          (ex.sets||[]).forEach(s=>{
            if(!s.w) return;
            const txt=s.rpe?`${s.w}kg × ${s.r} @ RPE${s.rpe}`:`${s.w}kg × ${s.r}`;
            chips.appendChild(mkT("span","hist-chip",txt));
          });
          card.appendChild(chips);
        });
      }
      if(log.notes) card.appendChild(mkT("div","hist-notes",log.notes));
      content.appendChild(card);
    });
    return;
  }
  if(!S.histWeeks.length){
    const e=mk("div","hist-empty");
    e.appendChild(mkT("div","hist-empty-ico","📋"));
    e.appendChild(mkT("div","","No history yet — save your first session to start tracking."));
    content.appendChild(e); return;
  }
  S.histWeeks.forEach(wk=>{
    const b=mk("button","hist-week-btn");
    b.append(mkT("span","",weekLabel(wk)),mkT("span","","→"));
    b.onclick=()=>{ S.histSel=wk; S.histLog=sGet(`logs:${wk}`)||{}; S.view="hist-detail"; render(); };
    content.appendChild(b);
  });
}

render();
</script>
